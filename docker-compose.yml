version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '5051:5051'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.proxyapi.ru/openai/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1-mini}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-xiaomi/mimo-v2-omni}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-denis}

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:8080'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
